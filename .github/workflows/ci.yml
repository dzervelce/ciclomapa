name: CI

on:
  push:
    # Velokarte: upstream CI runs yarn --frozen-lockfile which doesn't apply
    # to our Bun workflow. Restrict to upstream-tracking branch only.
    branches: ["upstream-master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Format check
        run: yarn format:check

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test --watchAll=false

