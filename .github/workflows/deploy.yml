name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend deps
        run: bun install

      - name: Build frontend
        env:
          REACT_APP_MAPTILER_API_KEY: ${{ secrets.REACT_APP_MAPTILER_API_KEY }}
          REACT_APP_MAPTILER_STYLE_URL: ${{ secrets.REACT_APP_MAPTILER_STYLE_URL }}
          REACT_APP_OPENROUTESERVICE_API_KEY: ${{ secrets.REACT_APP_OPENROUTESERVICE_API_KEY }}
          REACT_APP_PMTILES_URL: ${{ secrets.REACT_APP_PMTILES_URL }}
          REACT_APP_PMTILES_FILENAME: latvia.pmtiles
        run: bun run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync frontend build
        run: |
          rsync -avzr --delete ./build/ \
            "deploy@${{ secrets.VPS_HOST }}:/srv/velokarte/build/"

      - name: Rsync backend, scripts, infra
        run: |
          rsync -avzr --delete --exclude=node_modules --exclude=bun.lockb backend/ \
            "deploy@${{ secrets.VPS_HOST }}:/srv/velokarte/backend/"
          rsync -avzr --delete scripts/ \
            "deploy@${{ secrets.VPS_HOST }}:/srv/velokarte/scripts/"
          rsync -avzr --delete infra/ \
            "deploy@${{ secrets.VPS_HOST }}:/srv/velokarte/infra/"

      - name: Stage Caddyfile
        run: |
          rsync -avz infra/Caddyfile \
            "deploy@${{ secrets.VPS_HOST }}:/tmp/Caddyfile.new"
          ssh "deploy@${{ secrets.VPS_HOST }}" \
            'sudo /usr/bin/install -m 644 -o root -g root /tmp/Caddyfile.new /etc/caddy/Caddyfile'

      - name: Run post-deploy hook
        run: |
          ssh "deploy@${{ secrets.VPS_HOST }}" 'sudo /srv/velokarte/infra/deploy.sh'
